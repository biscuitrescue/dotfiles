$mod = SUPER

# monitors

monitor = eDP-1, disable
# monitor = eDP-1, 1920x1080@60, 0x225, 1.2
monitor = HDMI-A-1, 2560x1440@60, 1601x0, 1.25

# env/startup

exec-once = waybar
exec-once = nm-applet
exec-once = battery
exec-once = hypridle
exec-once = ./portal.sh
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprpaper

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    layout = scrolling
        border_size = 1

        col.active_border = 0xffF02D3A
        col.inactive_border = 0xff7180ac

        gaps_in = 3
        gaps_out = 5

        resize_on_border = true
}

# layout
master {
    new_on_top = true
        new_status = master
        mfact = 0.6
}

scrolling {
    fullscreen_on_one_column = true
    focus_fit_method = 1
}

# misc {
#     vfr = true
# }

# decoration
decoration {
    rounding = 4
    rounding_power = 5

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
            size = 5
            passes = 2
            vibrancy = 0.1696
    }
}

# animations
animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        2,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     3,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     2,  almostLinear
    animation = workspacesIn,  1,     2,  almostLinear
    animation = workspacesOut, 1,     2,  almostLinear
    animation = zoomFactor,    1,     7,     quick
}

workspace = w[tv1], gapsout:3, gapsin:3
workspace = f[1], gapsout:0, gapsin:0
windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]
    border_size = 0
    rounding = 8
}

input {
    kb_layout = us
        follow_mouse = 1

        touchpad {
            disable_while_typing = true
            natural_scroll = true
            drag_lock = true
        }

}
gesture = 3, horizontal, workspace
gesture = 3, vertical, move
gesture = 3, vertical, mod: SUPER, resize

# misc
misc {
    disable_hyprland_logo = true
        disable_splash_rendering = true
}

# xwayland

xwayland {
    force_zero_scaling = true
}

# workspaces

# HDMI → 1-5
workspace = 1, monitor:HDMI-A-1
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1

# Laptop → 6-10
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# apps

bind = $mod, RETURN, exec, kitty
bind = $mod, D, exec, rofi -show drun
bind = $mod SHIFT, D, exec, rofi -show run
bind = $mod, F, exec, nautilus

bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exec, hyprctl dispatch exit

bind = $mod, space, togglefloating
bind = $mod, W, fullscreen

# nav

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive, 40 0
bind = $mod CTRL, K, resizeactive, 0 -40
bind = $mod CTRL, J, resizeactive, 0 40

# Switch
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod CTRL, 1, workspace, 6
bind = $mod CTRL, 2, workspace, 7
bind = $mod CTRL, 3, workspace, 8
bind = $mod CTRL, 4, workspace, 9
bind = $mod CTRL, 5, workspace, 10

# Move
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod CTRL SHIFT, 1, movetoworkspace, 6
bind = $mod CTRL SHIFT, 2, movetoworkspace, 7
bind = $mod CTRL SHIFT, 3, movetoworkspace, 8
bind = $mod CTRL SHIFT, 4, movetoworkspace, 9
bind = $mod CTRL SHIFT, 5, movetoworkspace, 10

# mouse

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# media keys

bind = , XF86AudioRaiseVolume, exec, makofy volume_up
bind = , XF86AudioLowerVolume, exec, makofy volume_down
bind = , XF86AudioMute, exec, makofy volume_mute

bind = , XF86MonBrightnessUp, exec, makofy brightness_up
bind = , XF86MonBrightnessDown, exec, makofy brightness_down
bind = $mod, XF86AudioRaiseVolume, exec, makofy brightness_up
bind = $mod, XF86AudioLowerVolume, exec, makofy brightness_down

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = $mod SHIFT, g, exec, bash ~/.enable.sh

# screenshot

bind = $mod SHIFT, a, exec, hyprlock
bind = , PRINT, exec, grimshot
bind = SHIFT, PRINT, exec, grimclip
bind = $mod SHIFT, S, exec, grimclip
bind = $mod, PRINT, exec, grimcrop

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

bind = $mod SHIFT, P, movetoworkspace, special:term
bind = $mod, P, togglespecialworkspace, special:term
bind = $mod SHIFT, O, movetoworkspace, special:ed
bind = $mod, O, togglespecialworkspace, special:ed

# Scrolling
bind = $mod, period, layoutmsg, move +col
bind = $mod, comma, layoutmsg, move -col
bind = $mod, s, layoutmsg, move +col
bind = $mod, a, layoutmsg, move -col
bind = $mod SHIFT, period, layoutmsg, colresize +0.1
bind = $mod SHIFT, comma, layoutmsg, colresize -0.1
bind = $mod CTRL, period, layoutmsg, swapcol r
bind = $mod CTRL, comma, layoutmsg, swapcol l
bind = $mod, C, exec, hyprctl getoption scrolling:focus_fit_method | grep -q "int: 0" && hyprctl keyword scrolling:focus_fit_method 1 || hyprctl keyword scrolling:focus_fit_method 0

bind = $mod, mouse_up, layoutmsg, move +col
bind = $mod, mouse_down, layoutmsg, move -col

# Waybar
bind = SUPER, B, exec, killall -SIGUSR1 waybar
